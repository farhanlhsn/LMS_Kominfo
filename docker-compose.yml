services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lms
      POSTGRES_USER: lms
      POSTGRES_PASSWORD: lms_password
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lms -d lms"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio_password
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

  migrate:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      DATABASE_URL: postgresql://lms:lms_password@postgres:5432/lms?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-c", "/app/node_modules/.bin/prisma migrate deploy --schema=/app/prisma/schema.prisma"]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      API_PORT: ${API_PORT:-4000}
      DATABASE_URL: postgresql://lms:lms_password@postgres:5432/lms?schema=public
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-local}
      S3_BUCKET: ${S3_BUCKET:-lms-local}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minio}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minio_password}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CODE_RUNNER_PROVIDER: ${CODE_RUNNER_PROVIDER:-auto}
      JUDGE0_BASE_URL: ${JUDGE0_BASE_URL:-}
      JUDGE0_API_KEY: ${JUDGE0_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      minio:
        condition: service_started
    ports:
      - "${API_PORT:-4000}:4000"

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
    depends_on:
      - api

  gateway:
    image: nginx:1.27-alpine
    depends_on:
      - api
      - web
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${WEB_PORT:-3000}:80"

  nginx:
    build:
      context: .
      dockerfile: docker/nginx.Dockerfile
    ports:
      - "${NGINX_PORT:-8080}:80"
    depends_on:
      - api
      - web

  # ── Code runner sandbox (optional): docker compose --profile code-runner up -d
  # Then set JUDGE0_BASE_URL=http://localhost:2358 (host API) or http://judge0-server:2358 (api container)
  judge0-db:
    profiles: [code-runner]
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0
    volumes:
      - judge0-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judge0 -d judge0"]
      interval: 10s
      timeout: 5s
      retries: 10

  judge0-redis:
    profiles: [code-runner]
    image: redis:7-alpine
    volumes:
      - judge0-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  judge0-server:
    profiles: [code-runner]
    image: judge0/judge0:1.13.1
    privileged: true
    volumes:
      - ./docker/judge0.conf:/judge0.conf:ro
    ports:
      - "${JUDGE0_PORT:-2358}:2358"
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy

  judge0-workers:
    profiles: [code-runner]
    image: judge0/judge0:1.13.1
    command: ["./scripts/workers"]
    privileged: true
    volumes:
      - ./docker/judge0.conf:/judge0.conf:ro
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy
      judge0-server:
        condition: service_started

volumes:
  postgres-data:
  redis-data:
  minio-data:
  judge0-postgres-data:
  judge0-redis-data:
