# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.deploy.yml — Production/staging deployment
#
# Usage:
#   export API_IMAGE=ghcr.io/org/lms-api:sha-xxxxxx
#   export WEB_IMAGE=ghcr.io/org/lms-web:sha-xxxxxx
#   export DEPLOY_ENV=production
#   envsubst < docker/docker-compose.deploy.yml > docker-compose.deploy.yml
#   docker compose -f docker-compose.deploy.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: lms
      POSTGRES_USER: lms
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lms -d lms"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data

  migrate:
    image: ${API_IMAGE:?API_IMAGE is required}
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://lms:${POSTGRES_PASSWORD}@postgres:5432/lms?schema=public
    command: ["sh", "-c", "/app/node_modules/.bin/prisma migrate deploy --schema=/app/prisma/schema.prisma"]

  api:
    image: ${API_IMAGE:?API_IMAGE is required}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      minio:
        condition: service_started
    environment:
      NODE_ENV: ${DEPLOY_ENV:-production}
      API_PORT: 4000
      DATABASE_URL: postgresql://lms:${POSTGRES_PASSWORD}@postgres:5432/lms?schema=public
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_REGION: local
      S3_BUCKET: ${S3_BUCKET:-lms-production}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ENTERPRISE_SECRET_KEY: ${ENTERPRISE_SECRET_KEY}
      PLUGIN_SECRET_ENCRYPTION_KEY: ${PLUGIN_SECRET_ENCRYPTION_KEY:-}
      FILE_URL_SIGNING_SECRET: ${FILE_URL_SIGNING_SECRET:-}
      ACCESS_TOKEN_TTL_SECONDS: ${ACCESS_TOKEN_TTL_SECONDS:-900}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-30}
      AI_ENABLED: ${AI_ENABLED:-false}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}

  web:
    image: ${WEB_IMAGE:?WEB_IMAGE is required}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}

  gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - api
      - web
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${WEB_PORT:-3000}:80"

volumes:
  postgres-data:
  redis-data:
  minio-data:
