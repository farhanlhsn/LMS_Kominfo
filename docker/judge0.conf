# Minimal Judge0 CE config for local LMS sandbox.
# Used by docker compose profile `code-runner`.

REDIS_HOST=judge0-redis
REDIS_PORT=6379

POSTGRES_HOST=judge0-db
POSTGRES_PORT=5432
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=judge0

# LMS uses POST /submissions?wait=true
ENABLE_WAIT_RESULT=true
MAX_QUEUE_SIZE=100
MAX_CPU_TIME_LIMIT=15
MAX_WALL_TIME_LIMIT=20
MAX_MEMORY_LIMIT=512000
MAX_MAX_FILE_SIZE=1024
MAX_PROCESSES_AND_OR_THREADS=60
ENABLE_PER_PROCESS_AND_THREAD_TIME_LIMIT=false
ENABLE_PER_PROCESS_AND_THREAD_MEMORY_LIMIT=false
ALLOW_ENABLE_NETWORK=false
