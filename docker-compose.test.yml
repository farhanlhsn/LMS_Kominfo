# Isolated stack for API integration tests.
# Uses dedicated DB/ports so it never touches dev/prod data.
services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lms
      POSTGRES_PASSWORD: lms_test
      POSTGRES_DB: lms_test
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lms -d lms_test"]
      interval: 2s
      timeout: 5s
      retries: 30
    tmpfs:
      - /var/lib/postgresql/data

  redis-test:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30
