packages:
  - "apps/*"
  - "packages/*"

overrides:
  "@nestjs/platform-express>multer": "2.2.0"
  "monaco-editor>dompurify": "3.4.11"
  "next>postcss": "8.5.20"
  "minimatch@3.1.5>brace-expansion": "1.1.16"

onlyBuiltDependencies:
  - "@prisma/client"
  - "@prisma/engines"
  - "@swc/core"
  - "esbuild"
  - "onnxruntime-node"
  - "protobufjs"
  - "prisma"
  - "sharp"
allowBuilds:
  "@prisma/client": true
  "@prisma/engines": true
  '@scarf/scarf': false
  "@swc/core": true
  cpu-features: false
  esbuild: true
  msgpackr-extract: true
  onnxruntime-node: true
  prisma: true
  protobufjs: true
  sharp: true
  ssh2: false
