# ─────────────────────────────────────────────────────────────────────────────
# CI — Lint, typecheck, build, test
# ─────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "11.7.0"
  DATABASE_URL: "postgresql://lms:lms_password@localhost:5432/lms?schema=public"
  REDIS_URL: "redis://localhost:6379"

jobs:
  # ── Lint & Typecheck ─────────────────────────────────────────────────────
  lint:
    name: Lint & typecheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm db:generate

      - name: Lint & typecheck
        run: pnpm lint

  # ── Build ────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-24.04
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm db:generate

      - name: Build
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            apps/api/dist
            apps/web/.next
            packages/*/dist
          retention-days: 3

  # ── Unit & Integration Tests ────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-24.04
    needs: [build]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lms
          POSTGRES_USER: lms
          POSTGRES_PASSWORD: lms_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lms -d lms"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm db:generate

      - name: Run Prisma migrations
        run: pnpm db:deploy

      - name: Seed database
        run: pnpm db:seed

      - name: Run tests
        run: pnpm test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7

  # ── E2E Tests ──────────────────────────────────────────────────────────
  e2e:
    name: E2E tests
    runs-on: ubuntu-24.04
    needs: [build]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lms
          POSTGRES_USER: lms
          POSTGRES_PASSWORD: lms_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lms -d lms"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm db:generate

      - name: Run Prisma migrations
        run: pnpm db:deploy

      - name: Seed database
        run: pnpm db:seed

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium

      - name: Run E2E tests
        run: pnpm e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
